name: Release Certification

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  npm_config_legacy_peer_deps: "true"
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  certify:
    name: Certify ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            tmux

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browser for Linux E2E
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Check Tauri shell
        run: cargo check -p at-terminal

      - name: Check base module server
        run: cargo check -p at-terminal-base-module

      - name: Test Rust workspace
        run: cargo test --workspace

      - name: Run Linux E2E
        if: runner.os == 'Linux'
        run: npm run test:e2e

      - name: Build Tauri bundle
        run: npm run tauri -- build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: at-terminal-${{ matrix.os }}-bundle
          path: target/release/bundle/**
          if-no-files-found: error
